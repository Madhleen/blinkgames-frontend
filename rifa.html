<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Detalhes da Rifa — BlinkGames">
  <title>Rifa — BlinkGames</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />

  <script type="module" src="js/app.js" defer></script>
  <script type="module" src="js/pacman-bg.js" defer></script>
  <script type="module" src="js/raffle-detail.js" defer></script>
</head>
<body>
  <canvas id="pacman-bg" aria-hidden="true"></canvas>

  <!-- Header -->
  <header class="header">
    <div class="logo">Blink<span>Games</span></div>
    <button id="menu-toggle" aria-label="Abrir menu" class="menu-btn">☰</button>
    <nav class="nav" id="nav-menu">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/rifas.html">Rifas</a></li>
        <li><a href="/vencedores.html">Vencedores</a></li>
        <li><a href="/termos.html">Termos</a></li>
        <li><a href="/sobre.html">Sobre</a></li>
        <li><a href="/conta.html">Minha Conta</a></li>
        <li>
          <a href="/carrinho.html" class="cart-link">
            <img src="img/icons/cart.svg" alt="Carrinho" class="cart-icon" />
            <span id="cart-badge" class="badge">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="container page">
    <section id="raffle-detail" class="raffle-detail">
      <!-- Conteúdo dinâmico (JS) -->
      <div class="loader">Carregando rifa...</div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>© 2025 BlinkGames — Todos os direitos reservados.</p>
      <p>
        <a href="mailto:blinkgamesoficial@hotmail.com">blinkgamesoficial@hotmail.com</a> |
        <a href="https://instagram.com/blinkgamesoficial" target="_blank">@blinkgamesoficial</a>
      </p>
      <div class="pacman-toggle">
        <label>
          <input type="checkbox" id="toggle-animation" checked />
          Animação Pac-Man
        </label>
      </div>
    </div>
  </footer>

  <!-- Template do conteúdo (injetado via JS) -->
  <template id="raffle-template">
    <article class="raffle-card-detail">
      <img id="raffle-img" src="" alt="" class="raffle-img" />
      <div class="raffle-info">
        <h1 id="raffle-title"></h1>
        <p id="raffle-desc" class="raffle-desc"></p>
        <p><strong>Preço:</strong> R$ <span id="raffle-price"></span></p>
        <p><strong>Data do sorteio:</strong> <span id="raffle-date"></span></p>

        <div class="raffle-actions">
          <h3>Escolha quantos números:</h3>
          <div class="quantity-controls">
            <button class="qty-btn" data-add="1">+1</button>
            <button class="qty-btn" data-add="5">+5</button>
            <button class="qty-btn" data-add="10">+10</button>
            <button class="qty-btn" data-add="50">+50</button>
            <button class="qty-btn" data-add="100">+100</button>
            <input id="custom-qty" type="number" min="1" placeholder="Qtd manual" />
          </div>

          <div id="numbers-preview" class="numbers-preview" hidden>
            <p><strong>Números gerados:</strong></p>
            <div id="preview-list"></div>
          </div>

          <button id="add-to-cart" class="btn-primary">Adicionar ao carrinho</button>
        </div>
      </div>
    </article>
  </template>
</body>
</html>
